- layout: left
  name: SmartFleet Website
  github: BryanLX/SmartFleet_Web
  description: | # this will include new lines to allow paragraphs
    We made a website, a fleet management platform that does not require any additional hardware/software to use. Our platform allows businesses with many vehicles to better manage and monitor their employee car use remotely and in an automated way. This remote monitoring allows company to identify long term employee car use trends and potential misuse of company vehicles. All that is needed is for the vehicle to have 3G/LTE access.

